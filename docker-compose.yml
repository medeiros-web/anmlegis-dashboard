version: "3.7"

services:
  anmlegis:
    image: ghcr.io/medeiros-web/anmlegis-dashboard:latest
    networks:
      - minha_rede
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - SITE_URL=https://anmlegis.chatatender.ia.br
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
      labels:
        - traefik.enable=true
        - traefik.http.routers.anmlegis.rule=Host(`anmlegis.chatatender.ia.br`)
        - traefik.http.routers.anmlegis.entrypoints=websecure
        - traefik.http.routers.anmlegis.priority=10
        - traefik.http.routers.anmlegis.tls.certresolver=letsencryptresolver
        - traefik.http.routers.anmlegis.service=anmlegis
        - traefik.http.services.anmlegis.loadbalancer.server.port=3000
        - traefik.http.services.anmlegis.loadbalancer.passHostHeader=1

networks:
  minha_rede:
    external: true
    name: minha_rede
